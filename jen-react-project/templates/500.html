{% extends "base.html" %}

{% block title %}Server Error - Tech Portfolio{% endblock %}

{% block content %}
<div class="error-container">
    <div class="error-code">500</div>
    <h1 class="error-title">Server Error</h1>
    <p class="error-message">
        Something went wrong on our end. Our team has been notified and is working on fixing it.
        Please try again later.
    </p>
    <div class="error-actions">
        <a href="/" class="btn btn-primary">Back to Home</a>
        <a href="{{ CHANNEL_URL }}" target="_blank" class="btn btn-secondary">Visit YouTube</a>
    </div>
</div>
{% endblock %}
